name: OpenWrt Quick Node Check

on:
  workflow_dispatch:

jobs:
  test-node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 设置 Node 版本，确保 CI 环境和你的 .config 一致
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 检查 Node 与 npm 版本
      - name: Check Node.js and npm
        run: |
          echo "Node version:"
          node --version
          echo "npm version:"
          npm --version

      # 安装基础依赖（几分钟内）
      - name: Install basic packages
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget
          echo "Basic packages installed"

      # Sanity check: openwrt feeds update (不编译)
      - name: Clone OpenWrt source
        run: |
          git clone -b master https://github.com/immortalwrt/immortalwrt openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "Feeds updated successfully"

      # 最后检查 disk space
      - name: Disk space check
        run: df -hT
